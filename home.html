<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GitHub Issues Tracker</title>

    <!-- DaisyUI & Tailwind import related cdn  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
</head>

<body>
    <header class="">
        <div class="navbar bg-base-100 shadow-sm  px-4 md:px-20">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <div class="flex justify-center md:justify-start">
                    <div class="flex items-center gap-1">
                        <img class="w-8 md:w-9 h-auto" src="./assets/github-logo.png" alt="Github_Logo">
                        <a class="text-xl md:text-2xl text-[#1F2937] font-semibold">GitHub Issues Tracker</a>
                    </div>
                </div>

                <div class="flex justify-center md:justify-end gap-2 md:gap-3 ">
                    <div class="flex items-center gap-2 input input-bordered text-[14px] md:text-[16px] md:w-auto p-0 ">
                        <i class="fa-solid fa-magnifying-glass ml-3 text-gray-400"></i>
                        <input id="searchInput" type="text" placeholder="Search issues..."
                            class="w-full outline-none border-none p-3 pl-0" />
                    </div>
                    <div class="">
                        <div role="button" class="btn btn-primary text-[16px] text-[#FFFFFF]">
                            <i class="fa-solid fa-plus"></i><span class="hidden sm:inline">New Issue</span>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-[#F8FAFC] ">
        <div class="max-w-7xl mx-auto px-4 md:px-20 pt-15 space-y-3 ">
            <div class="bg-white p-[24px] shadow-sm rounded-xl space-x-1">
                <button id="allBtn" class="btn btn-outline">All</button>
                <button id="openedBtn" class="btn btn-outline">Opened</button>
                <button id="closedBtn" class="btn btn-outline">Closed</button>
            </div>



            <div class="bg-white  shadow-sm rounded-xl">

                <div
                    class="flex flex-col sm:flex-row justify-between items-start sm:items-center px-4 py-5 border-b-2 border-gray-300 gap-4 sm:gap-0">
                    <div class="flex items-center gap-4">
                        <div class="border-gray-200 border-10 rounded-full shrink-0">
                            <img class="w-7 h-7 object-contain" src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <div
                                class="text-[#1F2937] text-[18px] sm:text-[20px] font-semibold flex items-center gap-2">
                                <span id="issueCount">0</span> Issues
                            </div>
                            <p class="text-[14px] sm:text-[16px] text-[#64748B]">
                                Track and manage your project issues
                            </p>
                        </div>
                    </div>
                    <div class="flex gap-4 text-sm text-[#64748B]">
                        <span id="openCountMark"
                            class="text-[#1F2937] text-[14px] sm:text-[16px] flex items-center gap-1"><i
                                class="fa-solid fa-circle text-[#00A96E] text-[10px]"></i>
                            Open</span>
                        <span id="closedCountMark"
                            class="text-[#1F2937] text-[14px] sm:text-[16px] flex items-center gap-1"><i
                                class="fa-solid fa-circle text-[#8B5CF6] text-[10px]"></i>
                            Closed</span>
                    </div>
                </div>
                <div class="hidden flex justify-center items-center py-10" id="loadingSpinner">
                    <span class="loading loading-dots loading-xl text-gray-800"></span>
                </div>

                <div id="card" class=" grid grid-cols-1 md:grid-cols-4 gap-4 p-5">


                </div>

            </div>
        </div>

    </section>




    <dialog id="issue_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl bg-white rounded-2xl p-0 overflow-y-auto max-h-[85vh]">

            <div class="bg-gray-50 p-5 sm:p-6 border-b border-gray-200 relative">

                <form method="dialog">
                    <button
                        class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4 bg-gray-200 text-gray-600 hover:bg-gray-300 z-10">✕</button>
                </form>

                <h3 id="modal-title"
                    class="text-[18px] sm:text-[22px] font-bold text-[#1F2937] leading-snug pr-12 mb-3 break-words">
                </h3>

                <div class="flex flex-wrap items-center gap-x-3 gap-y-2 text-[#64748B] text-[13px]">
                    <div id="modal-status-badge"></div>

                    <div class="flex flex-wrap items-center gap-2">
                        <span>Opened by <span id="modal-author" class="font-bold text-[#1F2937]"></span></span>
                        <i class="fa-solid fa-circle text-[5px]"></i>
                        <span id="modal-date" class="font-medium"></span>
                    </div>
                </div>
            </div>

            <div class="p-5 sm:p-6">
                <div id="modal-labels" class="flex gap-2 mb-5 flex-wrap"></div>

                <div class="mb-8">
                    <p id="modal-desc" class="text-[14px] sm:text-[15px] text-[#475569] leading-relaxed break-words">
                    </p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="p-4 rounded-xl border border-gray-100 bg-[#F8FAFC] overflow-hidden">
                        <p class="text-[12px] text-[#64748B] font-medium uppercase mb-1">Assignee</p>
                        <p id="modal-assignee" class="text-[14px] sm:text-[15px] font-bold text-[#1F2937] truncate"></p>
                    </div>

                    <div class="p-4 rounded-xl border border-gray-100 bg-[#F8FAFC]">
                        <p class="text-[12px] text-[#64748B] font-medium uppercase mb-1">Priority</p>
                        <div id="modal-priority" class="mt-1"></div>
                    </div>
                </div>
            </div>

        </div>
    </dialog>


    <script src="./script/home.js"></script>
</body>

</html>
